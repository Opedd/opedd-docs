<!doctype html>
<html lang="en">
  <head>
    <title>Opedd API Reference</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Opedd API Reference — License content programmatically. Purchase, verify, and manage content licenses via REST API." />
    <link rel="icon" type="image/png" sizes="512x512" href="https://opedd.com/favicon.png" />
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <script
      id="api-reference"
      data-url="/openapi.json"
      data-configuration='{
        "theme": "default",
        "darkMode": true,
        "hideDownloadButton": false,
        "showSidebar": true,
        "defaultHttpClient": {
          "targetKey": "shell",
          "clientKey": "curl"
        },
        "metaData": {
          "title": "Opedd API Reference",
          "description": "License content programmatically.",
          "ogTitle": "Opedd API Reference"
        },
        "customCss": ".dark-mode { --scalar-background-1: #0D0D3B; --scalar-background-2: #111144; --scalar-background-3: #161655; --scalar-background-accent: #1a1a60; --scalar-color-accent: #7B7BF5; --scalar-color-accent-rgb: 123, 123, 245; } :root { --scalar-color-accent: #5B5BF0; }"
      }'
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
